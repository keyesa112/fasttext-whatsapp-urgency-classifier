{% extends "base.html" %}

{% block title %}Detail Pesan{% endblock %}
{% block page_title %}Detail Pesan{% endblock %}

{% block content %}

<!-- Back Button -->
<div class="mb-5">
    <a href="/messages/queue"
       class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:text-slate-800 hover:bg-slate-50 rounded-xl text-sm font-medium shadow-sm transition-all">
        <i class="fas fa-arrow-left text-xs"></i> Kembali ke Antrean
    </a>
</div>

<!-- Layout Grid -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

    <!-- LEFT: Message + Timeline (2/3) -->
    <div class="lg:col-span-2 space-y-5">

        <!-- Message Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden" id="message-card">
            <div class="flex items-center justify-center py-12 text-slate-400">
                <i class="fas fa-spinner fa-spin text-2xl mr-3"></i> Memuat...
            </div>
        </div>

        <!-- Timeline Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden" id="timeline-card">
            <div class="flex items-center justify-center py-8 text-slate-400">
                <i class="fas fa-spinner fa-spin text-xl mr-2"></i> Memuat riwayat...
            </div>
        </div>
    </div>

    <!-- RIGHT: Customer + Action (1/3) -->
    <div class="space-y-5">

        <!-- Customer Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden" id="customer-card">
            <div class="flex items-center justify-center py-10 text-slate-400">
                <i class="fas fa-spinner fa-spin text-xl mr-2"></i> Memuat...
            </div>
        </div>

        <!-- Action Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden" id="action-card">
            <div class="flex items-center justify-center py-10 text-slate-400">
                <i class="fas fa-spinner fa-spin text-xl mr-2"></i> Memuat...
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
const messageId = parseInt('{{ message_id }}');
let isProcessing = false;

// Intent config
const intentConfig = {
    urgent:     { tw: 'bg-red-100 text-red-700',     dot: 'bg-red-500',    icon: 'fa-exclamation-triangle', iconBg: 'bg-red-500' },
    normal:     { tw: 'bg-amber-100 text-amber-700', dot: 'bg-amber-400',  icon: 'fa-info-circle',          iconBg: 'bg-amber-400' },
    non_urgent: { tw: 'bg-emerald-100 text-emerald-700', dot: 'bg-emerald-500', icon: 'fa-comment', iconBg: 'bg-emerald-500' },
};
const statusConfig = {
    pending:     { tw: 'bg-amber-100 text-amber-700',   label: '⏳ Belum Ditangani' },
    in_progress: { tw: 'bg-blue-100 text-blue-700',     label: '🔄 Sedang Ditangani' },
    completed:   { tw: 'bg-emerald-100 text-emerald-700', label: '✓ Selesai' },
};

function intentBadge(intent) {
    const c = intentConfig[intent] || { tw: 'bg-slate-100 text-slate-600' };
    return `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold ${c.tw}">${intent.toUpperCase()}</span>`;
}
function statusBadge(status) {
    const c = statusConfig[status] || { tw: 'bg-slate-100 text-slate-600', label: status };
    return `<span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold ${c.tw}">${c.label}</span>`;
}

function isMobileDevice() {
    return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}
function getWhatsAppURL(phone) {
    const clean = phone.replace(/^0/, '').replace(/[^0-9]/g, '');
    const withCountry = clean.startsWith('62') ? clean : '62' + clean;
    return isMobileDevice()
        ? `whatsapp://send?phone=${withCountry}`
        : `https://web.whatsapp.com/send?phone=${withCountry}`;
}

async function loadDetail() {
    try {
        const [msgRes, ] = await Promise.all([fetch(`/api/messages/${messageId}`)]);
        const msg = await msgRes.json();

        const historyRes = await fetch(`/api/messages/customer/${msg.customer.id}?limit=10`);
        const history = await historyRes.json();

        const whatsappURL = getWhatsAppURL(msg.customer.phone);
        const ic = intentConfig[msg.intent] || intentConfig.non_urgent;

        // ===== MESSAGE CARD =====
        document.getElementById('message-card').innerHTML = `
            <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg ${ic.iconBg} bg-opacity-20 flex items-center justify-center">
                        <i class="fas ${ic.icon} text-sm" style="color: inherit"></i>
                    </div>
                    <h2 class="font-semibold text-slate-800">Pesan Terpilih</h2>
                </div>
                ${intentBadge(msg.intent)}
            </div>
            <div class="p-5 space-y-4">
                <!-- Info Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-slate-50 rounded-xl p-4">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Waktu</p>
                        <p class="text-sm font-medium text-slate-700">
                            <i class="fas fa-clock text-slate-400 mr-1"></i>
                            ${new Date(msg.timestamp).toLocaleString('id-ID', {
                                day: '2-digit', month: 'long', year: 'numeric',
                                hour: '2-digit', minute: '2-digit'
                            })}
                        </p>
                    </div>
                    <div class="bg-slate-50 rounded-xl p-4">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Status</p>
                        ${statusBadge(msg.status)}
                    </div>
                </div>

                <!-- Isi Pesan -->
                <div>
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">Isi Pesan</p>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 break-words whitespace-pre-wrap leading-relaxed">
                        ${msg.message_text}
                    </div>
                </div>

                <!-- Klasifikasi -->
                <div class="flex items-center gap-3">
                    <div>
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Klasifikasi AI</p>
                        <div class="flex items-center gap-2">
                            ${intentBadge(msg.intent)}
                            <span class="text-xs text-slate-400 font-medium">${(msg.confidence * 100).toFixed(1)}% confidence</span>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // ===== TIMELINE CARD =====
        document.getElementById('timeline-card').innerHTML = `
            <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center">
                        <i class="fas fa-history text-blue-500 text-sm"></i>
                    </div>
                    <h2 class="font-semibold text-slate-800">Riwayat Pesan <span class="text-slate-400 font-normal text-sm">(terbaru)</span></h2>
                </div>
                <span class="text-xs font-semibold bg-blue-100 text-blue-600 px-3 py-1 rounded-full">${history.total_messages} pesan</span>
            </div>
            <div class="p-5">
                <div class="timeline">
                    ${history.messages.map(m => {
                        const mic = intentConfig[m.intent] || intentConfig.non_urgent;
                        const isCurrentMsg = m.id === messageId;
                        return `
                            <div class="timeline-entry">
                                <div class="timeline-icon ${mic.iconBg}">
                                    <i class="fas ${mic.icon} text-white text-[10px]"></i>
                                </div>
                                <div class="timeline-body ${isCurrentMsg
                                    ? 'border-2 border-k24-500 bg-k24-50'
                                    : 'border border-slate-200 bg-slate-50'}">
                                    <div class="flex items-center justify-between mb-1.5">
                                        <div class="flex items-center gap-2">
                                            ${isCurrentMsg
                                                ? `<span class="text-xs font-bold text-k24-700">← Pesan ini</span>`
                                                : ''}
                                            ${intentBadge(m.intent)}
                                        </div>
                                        <span class="text-xs text-slate-400 flex-shrink-0 ml-2">
                                            <i class="fas fa-clock mr-1"></i>
                                            ${new Date(m.timestamp).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}
                                        </span>
                                    </div>
                                    <p class="text-sm text-slate-700 break-words whitespace-pre-wrap leading-relaxed">${m.message_text}</p>
                                </div>
                            </div>
                        `;
                    }).join('')}
                    <!-- End marker -->
                    <div class="timeline-entry">
                        <div class="timeline-icon bg-slate-300">
                            <i class="fas fa-clock text-white text-[10px]"></i>
                        </div>
                        <div class="timeline-body border border-slate-100">
                            <p class="text-xs text-slate-400 italic">Riwayat lebih lama mungkin masih tersedia</p>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // ===== CUSTOMER CARD =====
        document.getElementById('customer-card').innerHTML = `
            <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center">
                        <i class="fas fa-user text-blue-500 text-sm"></i>
                    </div>
                    <h2 class="font-semibold text-slate-800">Informasi Customer</h2>
                </div>
            </div>
            <div class="p-5">
                <!-- Avatar -->
                <div class="flex justify-center mb-5">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center shadow-lg">
                        <i class="fas fa-user text-white text-2xl"></i>
                    </div>
                </div>
                <!-- Info -->
                <div class="space-y-3">
                    <div class="flex items-center justify-between py-2.5 border-b border-slate-100">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Nama</span>
                        <span class="text-sm font-semibold text-slate-800">${msg.customer.name}</span>
                    </div>
                    <div class="flex items-center justify-between py-2.5 border-b border-slate-100">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">No. HP</span>
                        <code class="text-xs bg-slate-100 text-slate-700 px-2.5 py-1 rounded-lg font-mono">${msg.customer.phone}</code>
                    </div>
                    <div class="flex items-center justify-between py-2.5 border-b border-slate-100">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Total Pesan</span>
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">${history.total_messages}</span>
                    </div>
                    <div class="flex items-center justify-between py-2.5">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Urgent 30 Menit</span>
                        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-red-100 text-red-700">${history.urgent_count}</span>
                    </div>
                </div>
            </div>
        `;

        // ===== ACTION CARD =====
        document.getElementById('action-card').innerHTML = `
            <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-emerald-100 flex items-center justify-center">
                        <i class="fas fa-bolt text-emerald-500 text-sm"></i>
                    </div>
                    <h2 class="font-semibold text-slate-800">Aksi Cepat</h2>
                </div>
            </div>
            <div class="p-5 space-y-3">
                ${msg.status === 'pending' ? `
                    <button onclick="markInProgress(${msg.id})"
                            class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-semibold rounded-xl shadow-md shadow-blue-200 transition-all">
                        <i class="fas fa-play text-sm"></i> Mulai Tangani
                    </button>
                ` : ''}

                ${msg.status === 'in_progress' ? `
                    <button id="whatsapp-btn"
                            data-phone="${msg.customer.phone}"
                            data-customer-id="${msg.customer.id}"
                            data-url="${whatsappURL}"
                            class="w-full flex flex-col items-center justify-center gap-1 px-4 py-4 bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-semibold rounded-xl shadow-md shadow-emerald-200 transition-all">
                        <span class="flex items-center gap-2 text-base">
                            <i class="fab fa-whatsapp text-xl"></i> Balas via WhatsApp
                        </span>
                        <span class="text-xs opacity-80 font-normal">Otomatis tandai selesai</span>
                    </button>
                    <button onclick="markCompleted(${msg.customer.id})"
                            class="w-full flex items-center justify-center gap-2 px-4 py-2.5 border-2 border-emerald-500 text-emerald-600 hover:bg-emerald-50 font-semibold rounded-xl transition-all text-sm">
                        <i class="fas fa-check"></i> Tandai Selesai Manual
                    </button>
                ` : ''}

                ${msg.status === 'completed' ? `
                    <div class="flex flex-col items-center justify-center py-4 px-4 bg-emerald-50 border border-emerald-200 rounded-xl text-center mb-2">
                        <i class="fas fa-check-circle text-emerald-500 text-3xl mb-2"></i>
                        <p class="font-semibold text-emerald-700 text-sm">Sudah selesai ditangani</p>
                    </div>
                    <button id="whatsapp-btn-view"
                            data-url="${whatsappURL}"
                            class="w-full flex items-center justify-center gap-2 px-4 py-2.5 border-2 border-emerald-500 text-emerald-600 hover:bg-emerald-50 font-semibold rounded-xl transition-all text-sm">
                        <i class="fab fa-whatsapp text-lg"></i> Buka WhatsApp
                    </button>
                ` : ''}
            </div>
        `;

        attachWhatsAppListener();

    } catch (error) {
        console.error('Error:', error);
        showToast({ type: 'danger', title: 'Error', body: 'Gagal memuat detail pesan' });
    }
}

function attachWhatsAppListener() {
    const btn     = document.getElementById('whatsapp-btn');
    const btnView = document.getElementById('whatsapp-btn-view');

    if (btn) {
        btn.addEventListener('click', async function(e) {
            e.preventDefault();
            if (isProcessing) return;

            isProcessing = true;
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...`;

            const customerId   = this.dataset.customerId;
            const whatsappURL  = this.dataset.url;

            try {
                await fetch(`/api/messages/customer/${customerId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'completed' })
                });

                const waWindow = window.open(whatsappURL, 'WhatsAppChat');
                if (waWindow) {
                    waWindow.focus();
                } else {
                    showToast({ type: 'warning', title: 'Popup Diblokir', body: 'Izinkan popup di browser kamu' });
                }

                setTimeout(() => { loadDetail(); isProcessing = false; }, 1000);

            } catch (error) {
                console.error('❌ Error:', error);
                showToast({ type: 'danger', title: 'Error', body: 'Gagal memproses. Coba lagi.' });
                btn.disabled = false;
                btn.innerHTML = `<span class="flex items-center gap-2 text-base"><i class="fab fa-whatsapp text-xl"></i> Balas via WhatsApp</span><span class="text-xs opacity-80 font-normal">Otomatis tandai selesai</span>`;
                isProcessing = false;
            }
        });
    }

    if (btnView) {
        btnView.addEventListener('click', function(e) {
            e.preventDefault();
            if (isProcessing) return;
            isProcessing = true;
            const waWindow = window.open(this.dataset.url, 'WhatsAppChat');
            if (waWindow) waWindow.focus();
            else showToast({ type: 'warning', title: 'Popup Diblokir', body: 'Izinkan popup di browser kamu' });
            setTimeout(() => { isProcessing = false; }, 1000);
        });
    }
}

async function markInProgress(messageId) {
    if (!confirm('Mulai tangani pesan ini?')) return;
    try {
        await fetch(`/api/messages/${messageId}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'in_progress' })
        });
        showToast({ type: 'success', title: 'Berhasil!', body: 'Status: Sedang Ditangani' });
        loadDetail();
    } catch (error) {
        showToast({ type: 'danger', title: 'Error', body: 'Gagal update status' });
    }
}

async function markCompleted(customerId) {
    if (!confirm('Tandai selesai semua pesan customer ini?')) return;
    try {
        await fetch(`/api/messages/customer/${customerId}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'completed' })
        });
        showToast({ type: 'success', title: 'Selesai!', body: 'Semua pesan customer ditandai selesai' });
        loadDetail();
    } catch (error) {
        showToast({ type: 'danger', title: 'Error', body: 'Gagal tandai selesai' });
    }
}

$(document).ready(loadDetail);
</script>
{% endblock %}
